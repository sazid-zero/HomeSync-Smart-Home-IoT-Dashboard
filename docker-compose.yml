version: '3.8'

services:
  client:
    build: 
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:80" # Map to standard Vite port for convenience, though it runs on 80 inside container
    depends_on:
      - server
    networks:
      - homesync-net

  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://root:password@postgres:5432/homesync
      - JWT_SECRET=docker-compose-secret-key-123
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5173
      - SIMULATOR_INTERVAL_MS=15000 # Faster in dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - homesync-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: homesync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d homesync"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - homesync-net

volumes:
  pgdata:

networks:
  homesync-net:
    driver: bridge
